name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -name '*.sh' \
            -not -path './android/app/build/*' \
            -not -path './node_modules/*' \
            -not -path './.agent/*' \
            -print0 | xargs -0 --no-run-if-empty shellcheck --format=gcc -e SC2015,SC2016

  script-sync:
    name: Script Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify post-setup.sh sync
        run: |
          ASSET_SCRIPT="android/app/src/main/assets/scripts/post-setup.sh"
          if [ ! -f "$ASSET_SCRIPT" ]; then
            echo "Info: $ASSET_SCRIPT is generated during Android build (:app:bundleScripts). Skipping sync check."
            exit 0
          fi
          if ! diff -q post-setup.sh "$ASSET_SCRIPT"; then
            echo "ERROR: post-setup.sh files are out of sync!"
            echo "  Root:  post-setup.sh"
            echo "  App:   $ASSET_SCRIPT"
            echo "Both files must have identical content."
            exit 1
          fi
          echo "post-setup.sh files are in sync."

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 '.github/**/*.md' 'docs/**/*.md' '!node_modules' '!android/www/node_modules' '!android/www/dist' '!android/app/build'

  doc-freshness:
    name: Document Freshness
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check document freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_AFTER_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid BASE_SHA detected (likely first push on branch). Using HEAD~1 fallback."
            BASE_SHA="$(git rev-parse "$HEAD_SHA~1")"
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          WARN=0

          check_doc() {
            local pattern="$1"
            local doc="$2"
            local label="$3"
            if echo "$CHANGED" | grep -qE "$pattern"; then
              if ! echo "$CHANGED" | grep -qE "$doc"; then
                echo "Warning: $label code changed but $doc was not updated."
                WARN=1
              fi
            fi
          }

          check_doc '^install\.sh$' '^README\.md$' 'install.sh'
          check_doc '^oa\.sh$' '^README\.md$' 'oa.sh'
          check_doc '^(update\.sh|update-core\.sh)$' '^(README\.md|CHANGELOG\.md)$' 'update scripts'
          check_doc '^bootstrap\.sh$' '^README\.md$' 'bootstrap.sh'
          check_doc '^scripts/install-' '^README\.md$' 'install scripts'
          check_doc '^platforms/openclaw/' '^README\.md$' 'platform scripts'

          # Check 3-language sync for docs/ files
          for doc in $(echo "$CHANGED" | grep -E '^docs/.*\.md$' | grep -v '\.(ko|zh)\.md$'); do
            ko_doc="${doc%.md}.ko.md"
            zh_doc="${doc%.md}.zh.md"
            if [ -f "$ko_doc" ] && ! echo "$CHANGED" | grep -qF "$ko_doc"; then
              echo "Warning: $doc changed but Korean version $ko_doc was not updated."
              WARN=1
            fi
            if [ -f "$zh_doc" ] && ! echo "$CHANGED" | grep -qF "$zh_doc"; then
              echo "Warning: $doc changed but Chinese version $zh_doc was not updated."
              WARN=1
            fi
          done

          # Check 3-language sync for README
          if echo "$CHANGED" | grep -qE '^README\.md$'; then
            if ! echo "$CHANGED" | grep -qE '^README\.ko\.md$'; then
              echo "Warning: README.md changed but README.ko.md was not updated."
              WARN=1
            fi
            if ! echo "$CHANGED" | grep -qE '^README\.zh\.md$'; then
              echo "Warning: README.md changed but README.zh.md was not updated."
              WARN=1
            fi
          fi

          if [ "$WARN" -eq 1 ]; then
            echo ""
            echo "Document freshness check: some docs may need updating."
          else
            echo "Document freshness check passed."
          fi

  kotlin-lint:
    name: Kotlin Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Kotlin lint task (autodetect)
        run: |
          if ./gradlew -q tasks --all | grep -q 'ktlintCheck'; then
            ./gradlew ktlintCheck
          else
            echo "ktlintCheck task not found. Fallback to :app:lintDebug"
            ./gradlew :app:lintDebug
          fi

      - name: Run Detekt (if available)
        run: |
          if ./gradlew -q tasks --all | grep -q 'detekt'; then
            ./gradlew detekt
          else
            echo "detekt task not found. Skipping."
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: android/www/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install web dependencies for Gradle web build task
        run: cd www && npm ci

      - name: Run unit tests
        run: ./gradlew test
