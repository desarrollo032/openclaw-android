<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="44%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#060208"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#c42020"/>
      <stop offset="60%" stop-color="#8b1010"/>
      <stop offset="100%" stop-color="#5a0808"/>
    </radialGradient>
    <radialGradient id="iris" cx="30%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="55%" stop-color="#00c9a0"/>
      <stop offset="100%" stop-color="#006b60"/>
    </radialGradient>
    <radialGradient id="haloL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circ">
      <circle cx="100" cy="100" r="97"/>
    </clipPath>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="none"
          stroke="#c42020" stroke-width="0.8" stroke-opacity="0.22"/>

  <g clip-path="url(#circ)">

    <!-- Cuernos curvos (fieles al original) -->
    <path d="M68,34 Q56,14 46,12"
          stroke="#b01818" stroke-width="4"
          stroke-linecap="round" fill="none"/>
    <path d="M68,34 Q56,14 46,12"
          stroke="#ff6666" stroke-width="1.5"
          stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M132,34 Q144,14 154,12"
          stroke="#b01818" stroke-width="4"
          stroke-linecap="round" fill="none"/>
    <path d="M132,34 Q144,14 154,12"
          stroke="#ff6666" stroke-width="1.5"
          stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Orejas laterales (aletas del original) -->
    <path d="M38,68 C18,58 10,72 14,84
             C18,96 34,92 42,80 C46,74 44,66 38,68Z"
          fill="url(#body)" stroke="#6b0e0e" stroke-width="1"/>
    <path d="M162,68 C182,58 190,72 186,84
             C182,96 166,92 158,80 C154,74 156,66 162,68Z"
          fill="url(#body)" stroke="#6b0e0e" stroke-width="1"/>

    <!-- Cuerpo principal rechoncho -->
    <path d="M100,22
             C72,22 50,40 50,64
             C50,82 58,96 70,104
             L70,126 C70,129 72,131 75,131
             L75,120 C82,122 91,124 100,124
             C109,124 118,122 125,120
             L125,131 C128,131 130,129 130,126
             L130,104 C142,96 150,82 150,64
             C150,40 128,22 100,22Z"
          fill="url(#body)" stroke="#6b0e0e" stroke-width="1.2"/>

    <!-- Highlight de volumen -->
    <path d="M62,40 C56,50 54,60 56,72"
          fill="none" stroke="#e03030" stroke-width="2"
          stroke-linecap="round" opacity="0.35"/>

    <!-- Halos de ojos -->
    <ellipse cx="78" cy="62" rx="14" ry="14" fill="url(#haloL)"/>
    <ellipse cx="122" cy="62" rx="14" ry="14" fill="url(#haloR)"/>

    <!-- Sockets -->
    <ellipse cx="78" cy="62" rx="10" ry="10" fill="#060108"/>
    <ellipse cx="122" cy="62" rx="10" ry="10" fill="#060108"/>

    <!-- Iris con glow -->
    <ellipse cx="78" cy="62" rx="6.5" ry="6.5"
             fill="url(#iris)" filter="url(#bloom)"/>
    <ellipse cx="122" cy="62" rx="6.5" ry="6.5"
             fill="url(#iris)" filter="url(#bloom)"/>

    <!-- Pupilas verticales -->
    <ellipse cx="78" cy="62" rx="2" ry="4.5" fill="#020206"/>
    <ellipse cx="122" cy="62" rx="2" ry="4.5" fill="#020206"/>

    <!-- Speculares -->
    <circle cx="75.5" cy="59.5" r="1.8" fill="white" opacity="0.8"/>
    <circle cx="119.5" cy="59.5" r="1.8" fill="white" opacity="0.8"/>

    <!-- Terminal prompt -->
    <rect x="72" y="106" width="56" height="14" rx="3"
          fill="#0a0408" stroke="#00ffcc"
          stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="78" y="117"
          font-family="'Courier New', Courier, monospace"
          font-size="8" font-weight="700"
          fill="#00ffcc" opacity="0.7">$ _</text>

    <!-- Patas -->
    <rect x="72" y="124" width="14" height="24" rx="5"
          fill="#7a1010" stroke="#5a0808" stroke-width="1"/>
    <rect x="114" y="124" width="14" height="24" rx="5"
          fill="#7a1010" stroke="#5a0808" stroke-width="1"/>

    <!-- Garras cian — pata izquierda -->
    <path d="M75,146 Q68,156 64,165"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>
    <path d="M79,148 Q79,160 78,168"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>
    <path d="M83,146 Q90,156 94,165"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>

    <!-- Garras cian — pata derecha -->
    <path d="M117,146 Q110,156 106,165"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>
    <path d="M121,148 Q121,160 122,168"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>
    <path d="M125,146 Q132,156 136,165"
          stroke="#00ffcc" stroke-width="2.4"
          stroke-linecap="round" fill="none"
          opacity="0.9" filter="url(#bloom)"/>

  </g>
</svg>