name: Release

# Crea una release de GitHub con el APK debug + www.zip cuando se hace push de
# un tag `vX.Y.Z`. También se puede disparar manualmente desde la UI de Actions
# pasando el tag como input (útil para regenerar artefactos sin re-taggear).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (ej. v1.2.3). Debe existir en el repo."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Resolver tag y versión ──────────────────────────────────────────────
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag resolved"
            exit 1
          fi
          # Strip leading "v" for clean version string (v1.2.3 → 1.2.3)
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG (version=$VERSION)"

  # ── 2. Build del frontend (www.zip) ────────────────────────────────────────
  build-www:
    name: Build WebView UI
    runs-on: ubuntu-latest
    needs: resolve
    defaults:
      run:
        working-directory: android/www
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: android/www/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build (vite + tsc)
        run: npm run build

      - name: Package www.zip
        run: cd dist && zip -r ../www.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: www-zip
          path: android/www/www.zip
          if-no-files-found: error

  # ── 3. Build del APK ───────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [resolve, build-www]
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          # fetch-depth: 0 → necesario para updateVersionFromGit (lee tags)
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: android/www/package-lock.json

      - name: Install npm deps
        working-directory: android/www
        run: npm ci

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK 35
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-35" 2>/dev/null || \
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --install "platforms;android-35" 2>/dev/null || \
          echo "SDK 35 ya instalado o sdkmanager no disponible"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Stamp version from tag
        run: |
          ./gradlew updateVersionFromGit
          echo "version.properties:"
          cat version.properties || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK encontrado tras assembleDebug"
            exit 1
          fi
          mkdir -p ../release-out
          DEST="../release-out/openclaw-android-${{ needs.resolve.outputs.version }}.apk"
          cp "$APK" "$DEST"
          echo "APK copiado a $DEST"
          ls -lh "$DEST"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: release-out/openclaw-android-${{ needs.resolve.outputs.version }}.apk
          if-no-files-found: error

  # ── 4. Publicar la release de GitHub ───────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, build-www, build-apk]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: www-zip
          path: release-artifacts

      - name: Rename www.zip with version
        run: |
          if [ -f release-artifacts/www.zip ]; then
            mv release-artifacts/www.zip "release-artifacts/openclaw-www-${{ needs.resolve.outputs.version }}.zip"
          fi
          ls -la release-artifacts/

      - name: Compute SHA256 sums
        run: |
          cd release-artifacts
          sha256sum *.apk *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: OpenClaw Android ${{ needs.resolve.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## OpenClaw Android ${{ needs.resolve.outputs.tag }}

            APK debug listo para instalar y bundle del frontend (`www.zip`).

            ### Instalación
            1. Descarga el archivo `openclaw-android-${{ needs.resolve.outputs.version }}.apk`.
            2. Habilita "Instalar apps de orígenes desconocidos" en Android.
            3. Abre el APK desde tu navegador o gestor de archivos para instalarlo.

            ### Verificación de integridad
            Compara el SHA256 del APK con el publicado en `SHA256SUMS.txt`:
            ```sh
            sha256sum openclaw-android-${{ needs.resolve.outputs.version }}.apk
            ```

            ### Notas
            - APK firmado con la clave de **debug** de Android — no apto para Play Store.
              Para builds de producción se requiere configurar un keystore de release.
            - Requiere Android 12+ (API 31), arquitectura `arm64-v8a`.
          files: |
            release-artifacts/openclaw-android-${{ needs.resolve.outputs.version }}.apk
            release-artifacts/openclaw-www-${{ needs.resolve.outputs.version }}.zip
            release-artifacts/SHA256SUMS.txt
