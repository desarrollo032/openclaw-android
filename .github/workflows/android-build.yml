name: Android Build

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"

jobs:
  build-www:
    name: Build WebView UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/www
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: android/www/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: cd dist && zip -r ../www.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: www-zip
          path: android/www/www.zip
          if-no-files-found: error

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-www
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: android/www/package-lock.json

      - name: Install npm dependencies
        working-directory: android/www
        run: npm ci

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" 2>/dev/null || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-35" 2>/dev/null || \
          echo "SDK 35 already installed or sdkmanager not available"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Auto-generate versionCode/versionName from git
        run: |
          ./gradlew updateVersionFromGit
          echo "Versions:"
          cat version.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Locate APK and copy to known location
        run: |
          echo "=== Looking for APK files ==="
          find . -name '*.apk' -type f 2>/dev/null || echo "No APK found with find"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "debug/ dir not found"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "apk/ dir not found"
          # Try to find and copy to a flat location
          APK=$(find . -name '*.apk' -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            mkdir -p ../apk-out
            cp "$APK" ../apk-out/app-debug.apk
            echo "Copied $APK to ../apk-out/app-debug.apk"
          else
            echo "WARNING: No APK found!"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apk-out/app-debug.apk
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-www, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: www-zip
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: OpenClaw ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/*
